apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: nad-dmz
  namespace: dmz
spec:
  config: |
    {
      "cniVersion": "0.3.1",
      "name": "nad-dmz",
      "type": "macvlan",
      "master": "eth0",
      "mode": "bridge",
      "ipam": {
        "type": "host-local",
        "ranges": [
          [
            {
              "subnet": "10.0.1.0/24",
              "rangeStart": "10.0.1.10",
              "rangeEnd": "10.0.1.250",
              "gateway": "10.0.1.1"
            }
          ]
        ]
      }
    }
