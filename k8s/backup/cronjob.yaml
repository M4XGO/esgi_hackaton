apiVersion: batch/v1
kind: CronJob
metadata:
  name: h2-backup
  namespace: services
spec:
  schedule: "0 2 * * *"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: h2-backup
              image: busybox:1.36
              command: ["/bin/sh", "/scripts/backup.sh"]
              volumeMounts:
                - name: h2-data
                  mountPath: /data
                - name: backup-storage
                  mountPath: /backup
                - name: scripts
                  mountPath: /scripts
          volumes:
            - name: h2-data
              persistentVolumeClaim:
                claimName: itadaki-h2-pvc
            - name: backup-storage
              persistentVolumeClaim:
                claimName: backup-pvc
            - name: scripts
              configMap:
                name: backup-scripts
                defaultMode: 0755
