apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: openldap
  namespace: services
  labels:
    app: openldap
spec:
  serviceName: openldap
  replicas: 1
  selector:
    matchLabels:
      app: openldap
  template:
    metadata:
      labels:
        app: openldap
      annotations:
        k8s.v1.cni.cncf.io/networks: nad-services
    spec:
      initContainers:
        # Lit le LDIF template (placeholders __*_PW__) depuis le ConfigMap,
        # calcule les hashes SSHA depuis les secrets K8s,
        # écrit le LDIF final dans /ldif-custom (emptyDir writable).
        - name: gen-ldif
          image: python:3.12-alpine
          command: ["/bin/sh", "-c"]
          args:
            - |
              python3 << 'PYEOF'
              import hashlib, os, base64

              def ssha(password):
                  salt = os.urandom(4)
                  h = hashlib.sha1(password.encode('utf-8') + salt).digest()
                  return '{SSHA}' + base64.b64encode(h + salt).decode()

              admin1_pw  = ssha(os.environ['ADMIN1_PASSWORD'])
              editor_pw  = ssha(os.environ['EDITOR_PASSWORD'])
              viewer_pw  = ssha(os.environ['VIEWER_PASSWORD'])

              with open('/ldif-source/bootstrap.ldif') as f:
                  content = f.read()

              content = content.replace('__ADMIN1_PW__', admin1_pw)
              content = content.replace('__EDITOR_PW__', editor_pw)
              content = content.replace('__VIEWER_PW__', viewer_pw)

              with open('/ldif-custom/bootstrap.ldif', 'w') as f:
                  f.write(content)

              print("LDIF generated successfully.")
              PYEOF
          env:
            - name: ADMIN1_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ldap-users-secret
                  key: ADMIN1_PASSWORD
            - name: EDITOR_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ldap-users-secret
                  key: EDITOR_PASSWORD
            - name: VIEWER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ldap-users-secret
                  key: VIEWER_PASSWORD
          volumeMounts:
            - name: bootstrap-source
              mountPath: /ldif-source
              readOnly: true
            - name: bootstrap-writable
              mountPath: /ldif-custom
      containers:
        - name: openldap
          image: osixia/openldap:1.5.0
          ports:
            - containerPort: 389
              name: ldap
          env:
            - name: LDAP_ORGANISATION
              value: "ACME Corp"
            - name: LDAP_DOMAIN
              value: "acme.local"
            - name: LDAP_BASE_DN
              value: "dc=acme,dc=local"
            - name: LDAP_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ldap-secret
                  key: LDAP_ADMIN_PASSWORD
            - name: LDAP_SEED_INTERNAL_LDIF_PATH
              value: /ldif-custom
          readinessProbe:
            tcpSocket:
              port: 389
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 389
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
          resources:
            requests:
              memory: 128Mi
              cpu: 100m
            limits:
              memory: 256Mi
              cpu: 200m
          volumeMounts:
            - name: ldap-data
              mountPath: /var/lib/ldap
            - name: ldap-config
              mountPath: /etc/ldap/slapd.d
            - name: bootstrap-writable
              mountPath: /ldif-custom
      volumes:
        - name: bootstrap-source
          configMap:
            name: ldap-bootstrap
        - name: bootstrap-writable
          emptyDir: {}
  volumeClaimTemplates:
    - metadata:
        name: ldap-data
      spec:
        storageClassName: local-path
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: 1Gi
    - metadata:
        name: ldap-config
      spec:
        storageClassName: local-path
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: 100Mi
