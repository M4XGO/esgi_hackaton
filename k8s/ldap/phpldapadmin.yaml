apiVersion: apps/v1
kind: Deployment
metadata:
  name: phpldapadmin
  namespace: services
  labels:
    app: phpldapadmin
spec:
  replicas: 1
  selector:
    matchLabels:
      app: phpldapadmin
  template:
    metadata:
      labels:
        app: phpldapadmin
    spec:
      containers:
        - name: phpldapadmin
          image: osixia/phpldapadmin:0.9.0
          ports:
            - containerPort: 80
          env:
            - name: PHPLDAPADMIN_LDAP_HOSTS
              value: "openldap.services.svc.cluster.local"
            - name: PHPLDAPADMIN_HTTPS
              value: "false"
---
apiVersion: v1
kind: Service
metadata:
  name: phpldapadmin
  namespace: services
spec:
  type: ClusterIP
  selector:
    app: phpldapadmin
  ports:
    - name: http
      port: 80
      targetPort: 80
      protocol: TCP
