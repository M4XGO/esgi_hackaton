apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: openldap
  namespace: services
  labels:
    app: openldap
spec:
  serviceName: openldap
  replicas: 1
  selector:
    matchLabels:
      app: openldap
  template:
    metadata:
      labels:
        app: openldap
      annotations:
        k8s.v1.cni.cncf.io/networks: nad-services
    spec:
      initContainers:
        # Copie le LDIF depuis le ConfigMap (read-only) vers un emptyDir (writable)
        # monté sur /ldif-custom (chemin libre, pas un répertoire osixia)
        # → osixia lit via LDAP_SEED_INTERNAL_LDIF_PATH=/ldif-custom
        # → osixia rm son propre répertoire par défaut (pas un mount point)
        - name: copy-ldif
          image: busybox:1.36
          command: ["/bin/sh", "-c", "cp /ldif-source/bootstrap.ldif /ldif-custom/bootstrap.ldif"]
          volumeMounts:
            - name: bootstrap-source
              mountPath: /ldif-source
              readOnly: true
            - name: bootstrap-writable
              mountPath: /ldif-custom
      containers:
        - name: openldap
          image: osixia/openldap:1.5.0
          ports:
            - containerPort: 389
              name: ldap
          env:
            - name: LDAP_ORGANISATION
              value: "ACME Corp"
            - name: LDAP_DOMAIN
              value: "acme.local"
            - name: LDAP_BASE_DN
              value: "dc=acme,dc=local"
            - name: LDAP_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ldap-secret
                  key: LDAP_ADMIN_PASSWORD
            - name: LDAP_SEED_INTERNAL_LDIF_PATH
              value: /ldif-custom
          readinessProbe:
            tcpSocket:
              port: 389
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 389
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
          resources:
            requests:
              memory: 128Mi
              cpu: 100m
            limits:
              memory: 256Mi
              cpu: 200m
          volumeMounts:
            - name: ldap-data
              mountPath: /var/lib/ldap
            - name: ldap-config
              mountPath: /etc/ldap/slapd.d
            - name: bootstrap-writable
              mountPath: /ldif-custom
      volumes:
        - name: bootstrap-source
          configMap:
            name: ldap-bootstrap
        - name: bootstrap-writable
          emptyDir: {}
  volumeClaimTemplates:
    - metadata:
        name: ldap-data
      spec:
        storageClassName: local-path
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: 1Gi
    - metadata:
        name: ldap-config
      spec:
        storageClassName: local-path
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: 100Mi
