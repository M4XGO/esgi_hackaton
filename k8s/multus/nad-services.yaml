apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: nad-services
  namespace: services
spec:
  config: |
    {
      "cniVersion": "0.3.1",
      "name": "nad-services",
      "type": "macvlan",
      "master": "eth0",
      "mode": "bridge",
      "ipam": {
        "type": "host-local",
        "ranges": [
          [
            {
              "subnet": "10.0.2.0/24",
              "rangeStart": "10.0.2.10",
              "rangeEnd": "10.0.2.250",
              "gateway": "10.0.2.1"
            }
          ]
        ]
      }
    }
