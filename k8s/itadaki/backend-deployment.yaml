apiVersion: apps/v1
kind: Deployment
metadata:
  name: itadaki-backend
  namespace: services
  labels:
    app: itadaki-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: itadaki-backend
  template:
    metadata:
      labels:
        app: itadaki-backend
      annotations:
        k8s.v1.cni.cncf.io/networks: nad-services
    spec:
      containers:
        - name: backend
          image: m4xgo/itadaki-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:h2:file:/data/itadaki
            - name: SPRING_DATASOURCE_DRIVER_CLASS_NAME
              value: org.h2.Driver
            - name: SPRING_JPA_DATABASE_PLATFORM
              value: org.hibernate.dialect.H2Dialect
            - name: SPRING_H2_CONSOLE_ENABLED
              value: "true"
            - name: SPRING_H2_CONSOLE_SETTINGS_WEB_ALLOW_OTHERS
              value: "true"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: itadaki-secret
                  key: JWT_SECRET
            - name: UPLOAD_DIRECTORY
              value: /uploads
            # Ollama désactivé — FoodAnalyzer retourne un stub si indisponible
            - name: SPRING_AI_OLLAMA_BASE_URL
              value: http://ollama-disabled:11434
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /v3/api-docs
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 5
          resources:
            requests:
              memory: 512Mi
              cpu: 250m
            limits:
              memory: 1Gi
              cpu: 1000m
          volumeMounts:
            - name: h2-data
              mountPath: /data
            - name: uploads
              mountPath: /uploads
      volumes:
        - name: h2-data
          persistentVolumeClaim:
            claimName: itadaki-h2-pvc
        - name: uploads
          persistentVolumeClaim:
            claimName: itadaki-uploads-pvc
